<div *ngIf="response; then apod; else loading"></div>
<ng-template #apod>
  <section class="text-uppercase article-title">
    <h1>{{response.title}}</h1>
  </section>

  <section class="article-wrapper">
    <article class="article-content">
      <div *ngIf="response.media_type === 'image'" class="article-image">
        <img [src]="sanitizeURL(this.response.url)" alt="">
        <span class="text-muted">photo: <a [href]="sanitizeURL(this.response.hdurl)" class="link-magenta-dark">{{response.copyright}}</a></span>
      </div>
      <div *ngIf="response.media_type === 'video'" class="embed-responsive embed-responsive-16by9">
        <iframe class="embed-responsive-item" [src]="sanitizeURL(this.response.youtubeURL)" allow="encrypted-media" allowfullscreen></iframe>
      </div>
      <div class="article-col">
        <h1><a href="https://nasa.gov/" class="link-magenta-dark">NASA</a> | {{response.date}}</h1>
        <p>{{response.explanation}} &#9699;</p>
      </div>
    </article>
  </section>
</ng-template>

<ng-template #loading>
  <div class="article-loading">
    <svg class="spinner" viewBox="25 25 50 50">
      <circle class="path" cx="50" cy="50" r="20" fill="none" stroke-miterlimit="10"/>
    </svg>
  </div>
</ng-template>
